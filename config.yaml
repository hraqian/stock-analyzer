# Stock Technical Analysis — Scoring & Parameter Configuration
# ---------------------------------------------------------------
# All scores range from 0 (strongly bearish) to 10 (strongly bullish)
# Edit thresholds and weights to match your analysis style.
# Run `python main.py --generate-config` to regenerate this file with defaults.

rsi:
  period: 14
  thresholds:
    oversold: 30        # RSI below this → high score (oversold = potential reversal up)
    overbought: 70      # RSI above this → low score  (overbought = potential reversal down)
  scores:
    oversold_score: 9.0       # score when RSI <= oversold
    overbought_score: 1.0     # score when RSI >= overbought
    neutral_score: 5.0        # score at RSI = 50

macd:
  fast_period: 12
  slow_period: 26
  signal_period: 9
  scoring:
    # Histogram thresholds relative to current price (as % of price)
    strong_bullish_pct: 0.005   # histogram > price * this → score 9-10
    moderate_bullish_pct: 0.001 # histogram > price * this → score 7-8
    strong_bearish_pct: -0.005  # histogram < price * this → score 0-1
    moderate_bearish_pct: -0.001
    # Bonus/penalty for MACD line crossing signal line recently (within N bars)
    crossover_lookback: 5
    bullish_cross_bonus: 1.5
    bearish_cross_penalty: 1.5

bollinger_bands:
  period: 20
  std_dev: 2.0
  scoring:
    # Score based on %B = (price - lower) / (upper - lower)
    # %B = 0 → at lower band, %B = 1 → at upper band
    lower_zone: 0.20    # %B below this → score 8-10 (near support)
    upper_zone: 0.80    # %B above this → score 0-2  (near resistance)
    squeeze_threshold: 0.02  # band width / price below this = squeeze (volatility note)

moving_averages:
  periods: [20, 50, 200]
  type: "sma"           # "sma" or "ema"
  scoring:
    # Points awarded per condition, summed then normalized to 0-10
    price_above_ma_points: 1.5      # per MA that price is above
    ma_aligned_bullish_points: 1.0  # per consecutive bullish MA alignment (20>50, 50>200)
    golden_cross_bonus: 2.0         # 50 MA crossed above 200 MA within lookback bars
    death_cross_penalty: 2.0        # 50 MA crossed below 200 MA within lookback bars
    cross_lookback: 10              # bars to look back for golden/death cross
    max_raw_score: 9.5              # cap before normalization

stochastic:
  k_period: 14
  d_period: 3
  smooth_k: 3
  thresholds:
    oversold: 20
    overbought: 80
  scores:
    oversold_score: 9.0
    overbought_score: 1.0
    neutral_score: 5.0
    # Bonus when %K crosses %D (signal crossover)
    bullish_cross_bonus: 1.0
    bearish_cross_penalty: 1.0

adx:
  period: 14
  thresholds:
    weak: 20       # ADX below this = weak/no trend (was 30 — most stocks are below 30)
    moderate: 40   # ADX 20-40 = moderate trend
    # ADX above moderate = strong trend
  scoring:
    # Trend strength multiplier applied to directional score
    # Higher multipliers = more extreme scores when there IS a directional signal
    weak_multiplier: 0.6       # weak trend → still allow some directional scoring
    moderate_multiplier: 0.85
    strong_multiplier: 1.0
    # Base directional score from +DI vs -DI spread
    max_directional_spread: 25  # +DI - -DI spread for full score (was 40 — too wide)

volume:
  obv_trend_period: 20   # EMA period for OBV trend
  price_trend_period: 20 # EMA period for price trend comparison
  scoring:
    # Scores are now scaled by the magnitude of OBV change
    # Confirmation = OBV and price trends match direction
    # Divergence = OBV and price trends disagree
    confirmation_bullish_max: 9.5   # OBV confirms bullish price — strong reading
    confirmation_bullish_min: 6.5   # OBV confirms bullish price — weak reading
    confirmation_bearish_max: 3.5   # OBV confirms bearish price — weak reading
    confirmation_bearish_min: 0.5   # OBV confirms bearish price — strong reading
    divergence_score: 5.0           # OBV diverges from price trend (neutral)
    # OBV change % thresholds for scaling within the confirmation range
    obv_strong_change_pct: 10.0     # OBV change >= this % → use max confirmation score
    obv_weak_change_pct: 1.0        # OBV change <= this % → use min confirmation score

fibonacci:
  # Swing lookback to find recent high/low for retracement calculation
  swing_lookback: 60
  levels: [0.236, 0.382, 0.5, 0.618, 0.786]
  scoring:
    proximity_pct: 0.015   # within 1.5% of a level = "at that level"
    # Score based on which Fibonacci level price is near
    level_scores:
      0.236: 8.0   # shallow retracement (still bullish)
      0.382: 7.0
      0.5:   5.0
      0.618: 3.0   # deep retracement (more bearish)
      0.786: 1.5
    no_level_score: 5.0    # price not near any fib level
    # When not near a level, score based on position in range
    # These define the full range for range_position scoring (0.0 to 1.0)
    range_low_score: 2.0   # at bottom of range → bearish (was 3.5)
    range_high_score: 8.0  # at top of range → bullish (was 6.5)

support_resistance:
  # Method to detect S/R levels: "pivot", "fractal", or "both"
  method: "both"
  # Classic pivot point calculation (uses last complete bar's HLC)
  pivot_levels: ["S1", "S2", "S3", "P", "R1", "R2", "R3"]
  # Fractal-based: look for local min/max over this window
  fractal_lookback: 60
  fractal_order: 5          # number of bars each side for a local extremum
  num_levels: 4             # number of support AND resistance levels to display
  cluster_pct: 0.015        # merge levels within 1.5% of each other
  min_touches: 1            # minimum price touches to confirm a level

overall:
  # Weights for composite score — will be normalized if they don't sum to 1.0
  weights:
    rsi: 0.15
    macd: 0.15
    bollinger_bands: 0.10
    moving_averages: 0.20
    stochastic: 0.10
    adx: 0.10
    volume: 0.10
    fibonacci: 0.10

display:
  show_disclaimer: true
  score_decimal_places: 1
  price_decimal_places: 2
  color_thresholds:
    bearish_max: 3.5    # score <= this → red
    neutral_max: 6.5    # score <= this → yellow, above → green

# ─────────────────────────────────────────────────────────────────────────────
# Strategy & Backtesting Configuration
# ─────────────────────────────────────────────────────────────────────────────

strategy:
  # Map composite score ranges to trading decisions
  #
  # NOTE: The composite score (weighted average of 8 indicators) has lower
  # variance than individual indicators — it typically ranges ~3.5–6.5.
  # Set thresholds within that actual range for trades to trigger.
  # Use threshold_mode: "percentile" for self-calibrating thresholds.
  #
  # threshold_mode: "fixed" or "percentile"
  #   fixed      — use the absolute score values below
  #   percentile — use rolling percentile ranks (adaptive to each stock)
  threshold_mode: "fixed"

  score_thresholds:
    short_below: 4.5      # composite score <= this → SHORT
    hold_below: 5.5       # composite score <= this → HOLD
    # composite score > hold_below → LONG

  # Percentile mode settings (only used when threshold_mode = "percentile")
  percentile_thresholds:
    short_percentile: 25    # score in bottom 25% of recent window → SHORT
    long_percentile: 75     # score in top 25% of recent window → LONG
    lookback_bars: 60       # rolling window size for percentile calculation

  # Position sizing method: "fixed" or "percent_equity"
  position_sizing: "percent_equity"
  fixed_quantity: 100       # shares per trade (when sizing = "fixed")
  percent_equity: 0.80      # fraction of equity per trade (when sizing = "percent_equity")

  # Risk management
  stop_loss_pct: 0.05       # exit if position loses this fraction (0.05 = 5%)
  take_profit_pct: 0.20     # exit if position gains this fraction (0.20 = 20%)

  # How often to re-evaluate and potentially change position
  rebalance_interval: 5     # re-score every N bars

backtest:
  initial_cash: 100000.0    # starting portfolio cash
  commission_per_trade: 0.0 # flat commission per trade (set 0 to ignore)
  slippage_pct: 0.001       # simulated slippage as fraction of price (0.1%)
  # Minimum bars of data needed before the first signal can be generated
  # (must be >= longest indicator lookback, e.g. 200 for SMA200)
  warmup_bars: 200

# ─────────────────────────────────────────────────────────────────────────────
# Trading Mode Suitability Detection
# ─────────────────────────────────────────────────────────────────────────────
# Auto-detects whether a stock is suitable for shorting / active trading,
# then constrains the backtest strategy accordingly.
#
# Three modes:
#   long_short — both long and short positions allowed
#   long_only  — only long positions; goes to cash when bearish
#   hold_only  — unsuitable for active trading; display analysis only
#
# Set mode_override to force a specific mode (bypasses auto-detection):
#   mode_override: "auto"        (default — auto-detect)
#   mode_override: "long_short"  (force both directions)
#   mode_override: "long_only"   (force long-only)
#   mode_override: "hold_only"   (force hold-only)

suitability:
  mode_override: "auto"       # "auto", "long_short", "long_only", "hold_only"

  # hold_only thresholds — below these, stock is too illiquid/dead for trading
  min_volume: 100000          # avg daily volume below this → hold_only
  min_atr_pct: 0.005          # ATR/price below this → hold_only (0.5%)

  # long_only thresholds — below these, shorting is not viable
  min_adx_for_short: 20.0     # ADX below this → no clear trend to short
  min_atr_for_short: 0.01     # ATR/price below this → too low vol for shorts (1%)
  min_volume_for_short: 500000 # avg daily volume below this → insufficient for shorting

  # ATR calculation period
  atr_period: 14
