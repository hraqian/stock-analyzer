# Stock Technical Analysis — Scoring & Parameter Configuration
# ---------------------------------------------------------------
# All scores range from 0 (strongly bearish) to 10 (strongly bullish)
# Edit thresholds and weights to match your analysis style.
# Run `python main.py --generate-config` to regenerate this file with defaults.

rsi:
  period: 14
  thresholds:
    oversold: 30        # RSI below this → high score (oversold = potential reversal up)
    overbought: 70      # RSI above this → low score  (overbought = potential reversal down)
  scores:
    oversold_score: 9.0       # score when RSI <= oversold
    overbought_score: 1.0     # score when RSI >= overbought
    neutral_score: 5.0        # score at RSI = 50

macd:
  fast_period: 12
  slow_period: 26
  signal_period: 9
  scoring:
    # Histogram thresholds relative to current price (as % of price)
    strong_bullish_pct: 0.005   # histogram > price * this → score 9-10
    moderate_bullish_pct: 0.001 # histogram > price * this → score 7-8
    strong_bearish_pct: -0.005  # histogram < price * this → score 0-1
    moderate_bearish_pct: -0.001
    # Bonus/penalty for MACD line crossing signal line recently (within N bars)
    crossover_lookback: 5
    bullish_cross_bonus: 1.5
    bearish_cross_penalty: 1.5

bollinger_bands:
  period: 20
  std_dev: 2.0
  scoring:
    # Score based on %B = (price - lower) / (upper - lower)
    # %B = 0 → at lower band, %B = 1 → at upper band
    lower_zone: 0.20    # %B below this → score 8-10 (near support)
    upper_zone: 0.80    # %B above this → score 0-2  (near resistance)
    squeeze_threshold: 0.02  # band width / price below this = squeeze (volatility note)

moving_averages:
  periods: [20, 50, 200]
  type: "sma"           # "sma" or "ema"
  scoring:
    # Points awarded per condition, summed then normalized to 0-10
    price_above_ma_points: 1.5      # per MA that price is above
    ma_aligned_bullish_points: 1.0  # per consecutive bullish MA alignment (20>50, 50>200)
    golden_cross_bonus: 2.0         # 50 MA crossed above 200 MA within lookback bars
    death_cross_penalty: 2.0        # 50 MA crossed below 200 MA within lookback bars
    cross_lookback: 10              # bars to look back for golden/death cross
    max_raw_score: 9.5              # cap before normalization

stochastic:
  k_period: 14
  d_period: 3
  smooth_k: 3
  thresholds:
    oversold: 20
    overbought: 80
  scores:
    oversold_score: 9.0
    overbought_score: 1.0
    neutral_score: 5.0
    # Bonus when %K crosses %D (signal crossover)
    bullish_cross_bonus: 1.0
    bearish_cross_penalty: 1.0

adx:
  period: 14
  thresholds:
    weak: 20       # ADX below this = weak/no trend (was 30 — most stocks are below 30)
    moderate: 40   # ADX 20-40 = moderate trend
    # ADX above moderate = strong trend
  scoring:
    # Trend strength multiplier applied to directional score
    # Higher multipliers = more extreme scores when there IS a directional signal
    weak_multiplier: 0.6       # weak trend → still allow some directional scoring
    moderate_multiplier: 0.85
    strong_multiplier: 1.0
    # Base directional score from +DI vs -DI spread
    max_directional_spread: 25  # +DI - -DI spread for full score (was 40 — too wide)

volume:
  obv_trend_period: 20   # EMA period for OBV trend
  price_trend_period: 20 # EMA period for price trend comparison
  scoring:
    # Scores are now scaled by the magnitude of OBV change
    # Confirmation = OBV and price trends match direction
    # Divergence = OBV and price trends disagree
    confirmation_bullish_max: 9.5   # OBV confirms bullish price — strong reading
    confirmation_bullish_min: 6.5   # OBV confirms bullish price — weak reading
    confirmation_bearish_max: 3.5   # OBV confirms bearish price — weak reading
    confirmation_bearish_min: 0.5   # OBV confirms bearish price — strong reading
    divergence_score: 5.0           # OBV diverges from price trend (neutral)
    # OBV change % thresholds for scaling within the confirmation range
    obv_strong_change_pct: 10.0     # OBV change >= this % → use max confirmation score
    obv_weak_change_pct: 1.0        # OBV change <= this % → use min confirmation score

fibonacci:
  # Swing lookback to find recent high/low for retracement calculation
  swing_lookback: 60
  levels: [0.236, 0.382, 0.5, 0.618, 0.786]
  scoring:
    proximity_pct: 0.015   # within 1.5% of a level = "at that level"
    # Score based on which Fibonacci level price is near
    level_scores:
      0.236: 8.0   # shallow retracement (still bullish)
      0.382: 7.0
      0.5:   5.0
      0.618: 3.0   # deep retracement (more bearish)
      0.786: 1.5
    no_level_score: 5.0    # price not near any fib level
    # When not near a level, score based on position in range
    # These define the full range for range_position scoring (0.0 to 1.0)
    range_low_score: 2.0   # at bottom of range → bearish (was 3.5)
    range_high_score: 8.0  # at top of range → bullish (was 6.5)

support_resistance:
  # Method to detect S/R levels: "pivot", "fractal", or "both"
  method: "both"
  # Classic pivot point calculation (uses last complete bar's HLC)
  pivot_levels: ["S1", "S2", "S3", "P", "R1", "R2", "R3"]
  # Fractal-based: look for local min/max over this window
  fractal_lookback: 60
  fractal_order: 5          # number of bars each side for a local extremum
  num_levels: 4             # number of support AND resistance levels to display
  cluster_pct: 0.015        # merge levels within 1.5% of each other
  min_touches: 1            # minimum price touches to confirm a level

overall:
  # Weights for composite score — will be normalized if they don't sum to 1.0
  weights:
    rsi: 0.15
    macd: 0.15
    bollinger_bands: 0.10
    moving_averages: 0.20
    stochastic: 0.10
    adx: 0.10
    volume: 0.10
    fibonacci: 0.10

# ─────────────────────────────────────────────────────────────────────────────
# Pattern Signal Detectors
# ─────────────────────────────────────────────────────────────────────────────
# Patterns measure *what just happened* (a gap, a reversal candle, a volume
# spike) — a separate layer from indicators which measure *where the stock is*.
# Each pattern scores 0-10 (bearish to bullish), with 5.0 = no pattern / neutral.
# The pattern composite is displayed alongside but independent of the indicator
# composite.

gaps:
  lookback: 20               # number of recent bars to consider for scoring
  min_gap_pct: 0.005          # minimum gap size as fraction of price (0.5%)
  volume_surge_mult: 1.5      # volume > avg * this = surge (for gap classification)
  trend_period: 20            # EMA period for trend detection
  type_weights:               # weight of each gap type in net signal
    common: 0.3
    runaway: 0.7
    breakaway: 1.0
    exhaustion: 0.5           # exhaustion gaps get inverse signal (reversal)
  max_signal_strength: 3.0    # net signal beyond this = full score (0.5 or 9.5)

volume_range:
  period: 20                  # rolling average period for range and volume
  expansion_threshold: 1.5    # range/volume ratio >= this = expansion
  contraction_threshold: 0.6  # range/volume ratio <= this = contraction
  lookback: 10                # recent bars to count expansions/contractions
  scoring:
    expansion_bull: 8.0       # bullish expansion base score
    expansion_bear: 2.0       # bearish expansion base score
    contraction: 5.0          # contraction = neutral
    divergence: 5.0           # range/volume divergence = neutral

candlesticks:
  doji_threshold: 0.05        # body/range <= this = doji
  shadow_ratio: 2.0           # shadow must be >= body * this for hammer/star
  harami_body_ratio: 0.5      # current body must be <= prev body * this for harami
  dragonfly_shadow_min: 0.6   # lower shadow must be >= range * this for dragonfly doji
  gravestone_shadow_min: 0.6  # upper shadow must be >= range * this for gravestone doji
  doji_tiny_shadow_max: 0.1   # opposite shadow must be <= range * this for dragonfly/gravestone
  marubozu_body_min: 0.90     # body must fill >= this fraction of bar range for marubozu
  marubozu_shadow_max: 0.05   # each shadow must be <= this fraction of bar range for marubozu
  tweezer_tolerance: 0.002    # highs/lows match within this fraction of price for tweezer
  star_middle_body_max: 0.30  # middle bar body must be <= this fraction of range for morning/evening star
  soldiers_body_min: 0.60     # each bar body must be >= this fraction of range for 3 soldiers/crows
  soldiers_shadow_max: 0.30   # upper/lower shadow must be <= this fraction of range for 3 soldiers/crows
  lookback: 10                # recent bars to scan for patterns
  trend_period: 10            # EMA period for trend context
  max_signal_strength: 3.0    # net signal beyond this = full score

spikes:
  period: 20                  # rolling mean/std period
  spike_std: 2.5              # z-score threshold for spike detection
  confirm_bars: 3             # number of bars to check for confirmation
  confirm_pct: 0.5            # fraction of confirm_bars that must hold level
  lookback: 20                # recent bars to consider for scoring
  trap_weight: 0.7            # weight of trap (failed breakout) inverse signal
  max_signal_strength: 3.0    # net signal beyond this = full score

inside_outside:
  lookback: 20                # recent bars to consider for scoring
  trend_period: 10            # EMA period for trend context
  breakout_bars: 3            # bars after inside bar to check for breakout direction
  outside_range_min: 1.2      # current range / prev range must >= this for outside bar
  max_signal_strength: 3.0    # net signal beyond this = full score

overall_patterns:
  # Weights for pattern composite score — normalized if they don't sum to 1.0
  weights:
    gaps: 0.20
    volume_range: 0.25
    candlesticks: 0.25
    spikes: 0.15
    inside_outside: 0.15

display:
  show_disclaimer: true
  score_decimal_places: 1
  price_decimal_places: 2
  color_thresholds:
    bearish_max: 3.5    # score <= this → red
    neutral_max: 6.5    # score <= this → yellow, above → green

# ─────────────────────────────────────────────────────────────────────────────
# Strategy & Backtesting Configuration
# ─────────────────────────────────────────────────────────────────────────────

strategy:
  # Map composite score ranges to trading decisions
  #
  # NOTE: The composite score (weighted average of 8 indicators) has lower
  # variance than individual indicators — it typically ranges ~3.7–5.9.
  # Set thresholds within that actual range for trades to trigger.
  # Use threshold_mode: "percentile" for self-calibrating thresholds.
  #
  # threshold_mode: "fixed" or "percentile"
  #   fixed      — use the absolute score values below
  #   percentile — use rolling percentile ranks (adaptive to each stock)
  threshold_mode: "fixed"

  score_thresholds:
    short_below: 4.5      # composite score <= this → SHORT
    hold_below: 5.5       # composite score <= this → HOLD
    # composite score > hold_below → LONG

  # Percentile mode settings (only used when threshold_mode = "percentile")
  percentile_thresholds:
    short_percentile: 25    # score in bottom 25% of recent window → SHORT
    long_percentile: 75     # score in top 25% of recent window → LONG
    lookback_bars: 60       # rolling window size for percentile calculation

  # Position sizing method: "fixed" or "percent_equity"
  position_sizing: "percent_equity"
  fixed_quantity: 100       # shares per trade (when sizing = "fixed")
  percent_equity: 0.80      # fraction of equity per trade (when sizing = "percent_equity")

  # Risk management
  stop_loss_pct: 0.05       # exit if position loses this fraction (0.05 = 5%)
  take_profit_pct: 0.20     # exit if position gains this fraction (0.20 = 20%)

  # ATR-adaptive stop loss — uses N × ATR at entry time instead of fixed %
  # The effective stop is min(stop_loss_pct, atr_stop_multiplier × ATR / price)
  # so the fixed % acts as a safety ceiling.
  atr_stop_enabled: true    # set false to use only the fixed stop_loss_pct
  atr_stop_multiplier: 2.5  # N in "N × ATR" — higher = wider stop
  atr_stop_period: 14       # ATR calculation lookback period

  # Trend confirmation filter — before entering a new position, check that
  # price is on the right side of a short-term EMA.
  # BUY requires close > EMA(trend_confirm_period)
  # SHORT requires close < EMA(trend_confirm_period)
  # This prevents buying into active downtrends or shorting into uptrends.
  trend_confirm_enabled: true
  trend_confirm_period: 20   # EMA period for trend confirmation

  # How often to re-evaluate and potentially change position
  rebalance_interval: 1     # re-score every N bars

  # Day trading: force-close all positions at the end of each trading day
  # (only applies when using intraday intervals like 1m, 5m, 15m, etc.)
  flatten_eod: false

  # ── Pattern-Indicator Combination ──────────────────────────────────────
  # How the strategy combines indicator composite and pattern composite:
  #
  # "weighted" mode (default):
  #   blended_score = indicator_weight * indicator_composite + pattern_weight * pattern_composite
  #   Then the blended score is used for the same threshold logic as before.
  #
  # "gate" mode:
  #   Only trade LONG if indicator_score > gate_indicator_min AND pattern_score > gate_pattern_min
  #   Only trade SHORT if indicator_score < gate_indicator_max AND pattern_score < gate_pattern_max
  #   Otherwise HOLD.
  #
  # "boost" mode:
  #   Indicator score is the base signal (always passes through).
  #   When patterns are active (score outside the dead zone around 5.0),
  #   the pattern deviation is scaled by boost_strength and added to the
  #   indicator score. When no patterns fire, the indicator score is used
  #   unmodified. This avoids the weighted-mode problem where inactive
  #   patterns (score = 5.0) dilute the indicator signal toward neutral.
  combination_mode: "weighted"
  indicator_weight: 0.7       # weight of indicator composite in blended score
  pattern_weight: 0.3         # weight of pattern composite in blended score
  # Gate mode thresholds (only used when combination_mode = "gate")
  gate_indicator_min: 5.5     # indicator score must exceed this for LONG
  gate_indicator_max: 4.5     # indicator score must be below this for SHORT
  gate_pattern_min: 5.5       # pattern score must exceed this for LONG
  gate_pattern_max: 4.5       # pattern score must be below this for SHORT
  # Boost mode parameters (only used when combination_mode = "boost")
  boost_strength: 0.5         # multiplier for pattern deviation from 5.0
  boost_dead_zone: 0.3        # pattern score within 5.0 ± this → no boost

backtest:
  initial_cash: 100000.0    # starting portfolio cash
  commission_per_trade: 0.0 # flat commission per trade (set 0 to ignore)
  slippage_pct: 0.001       # simulated slippage as fraction of price (0.1%)
  # Minimum bars of data needed before the first signal can be generated
  # (must be >= longest indicator lookback, e.g. 200 for SMA200)
  warmup_bars: 100
  # Maximum fraction of total data that warmup can consume.  Prevents warmup
  # from eating most of a short dataset (e.g. 6mo = 126 bars).
  # warmup = min(warmup_bars, int(len(data) * max_warmup_ratio))
  max_warmup_ratio: 0.5
  # Minimum strength for a pattern to appear in the "Significant Patterns
  # Timeline" table at the end of the backtest output.  Lower = more patterns
  # shown.  Range depends on detector (candlestick strength is typically
  # 0.3–1.3; gap/spike strength is normalised to 0–2).
  significant_pattern_min_strength: 0.5

# ─────────────────────────────────────────────────────────────────────────────
# Market Regime Classification
# ─────────────────────────────────────────────────────────────────────────────
# Classifies the current market environment into one of four regimes.
# The regime drives strategy adaptation in backtesting — e.g. strong-trend
# regimes use trailing stops, range-bound regimes use score thresholds.
#
# Regimes:
#   strong_trend        — High ADX, consistent trend. Best: trailing stop / hold.
#   mean_reverting      — Low ADX, oscillates around MA. Best: swing trades.
#   volatile_choppy     — High ATR%, frequent reversals. Best: reduce size / sit out.
#   breakout_transition — BB squeeze then expansion. Best: momentum breakout entry.

regime:
  trend_ma_period: 50           # MA period for trend analysis
  adx_strong_trend: 30.0        # ADX above this → strong trend signal
  adx_weak: 20.0                # ADX below this → weak/no trend
  trend_consistency_high: 70.0  # % bars above MA → strong directional bias
  trend_consistency_low: 40.0   # below 100-this on bear side → strong bear bias
  atr_pct_high: 0.03            # ATR% above this → high volatility
  atr_pct_low: 0.01             # ATR% below this → low volatility
  atr_period: 14
  bb_period: 20
  bb_std_dev: 2.0
  bb_squeeze_percentile: 20.0   # BB width below this percentile → squeeze
  bb_expansion_percentile: 80.0 # BB width above this → expansion
  direction_change_high: 0.55   # fraction of bars reversing direction → choppy
  direction_change_period: 20
  price_ma_distance_extended: 0.10  # price > 10% from MA → extended trend
  total_return_strong: 0.30         # |return| > 30% over period → definitively trending
  total_return_moderate: 0.15       # |return| > 15% over period → moderate trend signal
  strategy_adaptation:
    strong_trend:
      use_trailing_stop: true       # trail stop instead of score-based exits
      trailing_stop_atr_mult: 3.0   # trailing stop distance = N × ATR
      ignore_score_entries: true     # don't use score thresholds for entry
      hold_with_trend: true          # stay in position while trend persists
    mean_reverting:
      use_trailing_stop: false
      tighten_thresholds: true      # narrow the HOLD zone for more trades
      threshold_adjustment: 0.3     # narrow SHORT/LONG thresholds by this
    volatile_choppy:
      reduce_position_size: true
      position_size_mult: 0.5       # halve position size
      widen_stops: true
      stop_loss_mult: 1.5           # widen stop loss by this factor
    breakout_transition:
      use_momentum_entry: true      # enter on breakout confirmation
      breakout_atr_mult: 1.5        # price must move N×ATR from squeeze level
      require_volume_surge: true
      volume_surge_mult: 1.3        # volume must exceed avg by this factor

# ─────────────────────────────────────────────────────────────────────────────
# Trading Mode Suitability Detection
# ─────────────────────────────────────────────────────────────────────────────
# Auto-detects whether a stock is suitable for shorting / active trading,
# then constrains the backtest strategy accordingly.
#
# Three modes:
#   long_short — both long and short positions allowed
#   long_only  — only long positions; goes to cash when bearish
#   hold_only  — unsuitable for active trading; display analysis only
#
# Set mode_override to force a specific mode (bypasses auto-detection):
#   mode_override: "auto"        (default — auto-detect)
#   mode_override: "long_short"  (force both directions)
#   mode_override: "long_only"   (force long-only)
#   mode_override: "hold_only"   (force hold-only)

suitability:
  mode_override: "auto"       # "auto", "long_short", "long_only", "hold_only"

  # hold_only thresholds — below these, stock is too illiquid/dead for trading
  min_volume: 100000          # avg daily volume below this → hold_only
  min_atr_pct: 0.005          # ATR/price below this → hold_only (0.5%)

  # long_only thresholds — below these, shorting is not viable
  min_adx_for_short: 25.0     # ADX below this → no clear trend to short
  min_atr_for_short: 0.01     # ATR/price below this → too low vol for shorts (1%)
  min_volume_for_short: 500000 # avg daily volume below this → insufficient for shorting

  # Trend direction filter — if price is above its long-term MA for more than
  # this % of the time, the stock has a structural upward bias and shorting
  # will lose more often than it wins over the long run → force long_only.
  trend_ma_period: 200        # long-term MA period for trend direction check
  max_pct_above_ma: 65.0      # if price is above MA for more than this % → long_only

  # ATR calculation period
  atr_period: 14

# ─────────────────────────────────────────────────────────────────────────────
# Trading Objective Presets
# ─────────────────────────────────────────────────────────────────────────────
# Named presets that override specific base values above.  Select via:
#   python main.py AAPL --objective long_term
#   python main.py AAPL --objective short_term -b
#
# Each preset is a partial config — only keys you list are overridden; all
# other settings keep their base values.  You can add your own custom presets
# (e.g. scalping, swing, position) by adding a new key under 'objectives'.
#
# The 'description' field is for display only and has no effect on behavior.

objectives:

  # ── Long-term / Position Trading ─────────────────────────────────────────
  # Designed for holding periods of weeks to months.
  # Uses slower indicator periods, wider stop/take-profit, and heavier weight
  # on trend-following indicators (moving averages, ADX, volume).
  long_term:
    description: "Position trading — weeks to months. Slower indicators, wider stops, higher warmup."

    rsi:
      period: 21
      thresholds:
        oversold: 25            # deeper oversold before signaling reversal
        overbought: 75          # higher overbought before signaling reversal

    macd:
      fast_period: 19           # ~1.5x standard (12 → 19)
      slow_period: 39           # ~1.5x standard (26 → 39)
      signal_period: 9

    bollinger_bands:
      period: 30                # wider window for smoother bands

    moving_averages:
      periods: [50, 100, 200]   # drop the 20-day, focus on longer trends

    stochastic:
      k_period: 21
      d_period: 5
      smooth_k: 5
      thresholds:
        oversold: 20
        overbought: 80

    adx:
      period: 21

    volume:
      obv_trend_period: 30
      price_trend_period: 30

    fibonacci:
      swing_lookback: 120       # look further back for swing high/low

    support_resistance:
      fractal_lookback: 120
      fractal_order: 8          # require more confirmation bars

    overall:
      weights:
        rsi: 0.10
        macd: 0.10
        bollinger_bands: 0.10
        moving_averages: 0.25   # heavier weight on trend
        stochastic: 0.05
        adx: 0.15               # trend strength matters more
        volume: 0.15            # institutional flow matters more
        fibonacci: 0.10

    strategy:
      rebalance_interval: 5     # less frequent re-evaluation
      stop_loss_pct: 0.10       # wider stop (10%)
      take_profit_pct: 0.30     # wider target (30%)
      indicator_weight: 0.8     # long-term: indicators matter more
      pattern_weight: 0.2
      atr_stop_multiplier: 3.0  # wider ATR stop for position trading
      trend_confirm_period: 50  # slower trend confirmation for long-term

    backtest:
      warmup_bars: 200          # need more data for slower indicators

  # ── Short-term / Swing Trading ───────────────────────────────────────────
  # Designed for holding periods of days to weeks.
  # Uses faster indicator periods, tighter stop/take-profit, and heavier
  # weight on momentum indicators (MACD, Stochastic, Bollinger).
  short_term:
    description: "Swing trading — days to weeks. Faster indicators, tighter stops, lower warmup."

    rsi:
      period: 9
      thresholds:
        oversold: 35            # trigger sooner on short-term moves
        overbought: 65

    macd:
      fast_period: 8            # faster response
      slow_period: 17
      signal_period: 9

    bollinger_bands:
      period: 14                # tighter bands, more responsive

    moving_averages:
      periods: [10, 20, 50]     # drop the 200-day, focus on shorter trends

    stochastic:
      k_period: 9
      d_period: 3
      smooth_k: 3
      thresholds:
        oversold: 25
        overbought: 75

    adx:
      period: 10

    volume:
      obv_trend_period: 10
      price_trend_period: 10

    fibonacci:
      swing_lookback: 30        # recent swings only

    support_resistance:
      fractal_lookback: 30
      fractal_order: 3          # fewer confirmation bars needed

    gaps:
      lookback: 15
      trend_period: 10
    volume_range:
      period: 10
      lookback: 8
    candlesticks:
      lookback: 8
      trend_period: 8
    spikes:
      period: 10
      lookback: 15
      confirm_bars: 2
    inside_outside:
      lookback: 15
      trend_period: 8
      breakout_bars: 2

    overall_patterns:
      weights:
        gaps: 0.15
        volume_range: 0.20
        candlesticks: 0.25
        spikes: 0.15
        inside_outside: 0.25   # breakout setups very relevant for swing trading

    overall:
      weights:
        rsi: 0.15
        macd: 0.20              # momentum matters most
        bollinger_bands: 0.15   # mean reversion in short term
        moving_averages: 0.10
        stochastic: 0.15        # short-term overbought/oversold
        adx: 0.10
        volume: 0.10
        fibonacci: 0.05

    strategy:
      rebalance_interval: 3     # more frequent re-evaluation
      stop_loss_pct: 0.03       # tighter stop (3%)
      take_profit_pct: 0.10     # tighter target (10%)
      indicator_weight: 0.6     # short-term: patterns matter more than long-term
      pattern_weight: 0.4
      atr_stop_multiplier: 2.0  # tighter ATR stop for swing trading
      trend_confirm_period: 10  # faster trend confirmation

    backtest:
      warmup_bars: 60           # much less data needed (no SMA200)

  # ── Day Trading / Intraday ──────────────────────────────────────────────
  # Designed for intraday positions only — all positions closed at end of day.
  # Uses very fast indicator periods, tight stop/take-profit, and heavy weight
  # on momentum indicators (MACD, Stochastic, RSI).
  #
  # Usage:
  #   python main.py AAPL --objective day_trading -b --interval 5m --period 1mo
  #   python main.py AAPL --objective day_trading -b --interval 15m --start <recent-date>
  #
  # Intraday data limits (yfinance):
  #   1m  = last 7 days      5m/15m/30m = last 60 days
  #   1h  = last 730 days    daily+     = unlimited
  day_trading:
    description: "Day trading — intraday positions only. Very fast indicators, tight stops, EOD flattening."

    rsi:
      period: 5
      thresholds:
        oversold: 30
        overbought: 70

    macd:
      fast_period: 5
      slow_period: 13
      signal_period: 6

    bollinger_bands:
      period: 10
      std_dev: 2.0

    moving_averages:
      periods: [5, 10, 20]      # very short-term MAs

    stochastic:
      k_period: 5
      d_period: 3
      smooth_k: 2
      thresholds:
        oversold: 20
        overbought: 80

    adx:
      period: 7

    volume:
      obv_trend_period: 10
      price_trend_period: 10

    fibonacci:
      swing_lookback: 20

    support_resistance:
      fractal_lookback: 20
      fractal_order: 3

    gaps:
      lookback: 10
      min_gap_pct: 0.003        # smaller gaps matter intraday
      trend_period: 7
    volume_range:
      period: 10
      lookback: 5
    candlesticks:
      lookback: 5
      trend_period: 5
    spikes:
      period: 10
      spike_std: 2.0            # lower threshold for intraday spikes
      lookback: 10
      confirm_bars: 2
    inside_outside:
      lookback: 10
      trend_period: 5
      breakout_bars: 2
      outside_range_min: 1.15   # lower threshold intraday — smaller bars
    overall_patterns:
      weights:
        gaps: 0.10              # gaps less meaningful intraday
        volume_range: 0.30      # volume-range very important intraday
        candlesticks: 0.25      # quick reversal patterns
        spikes: 0.15
        inside_outside: 0.20    # breakout setups important intraday

    overall:
      weights:
        rsi: 0.15
        macd: 0.25              # momentum is king intraday
        bollinger_bands: 0.10
        moving_averages: 0.05
        stochastic: 0.20        # fast overbought/oversold
        adx: 0.10
        volume: 0.10
        fibonacci: 0.05

    strategy:
      rebalance_interval: 1     # re-score every single bar
      stop_loss_pct: 0.015      # tight stop (1.5%)
      take_profit_pct: 0.03     # tight target (3%)
      flatten_eod: true         # force-close all positions at end of each day
      indicator_weight: 0.5     # day trading: equal weight to patterns
      pattern_weight: 0.5
      boost_strength: 0.7       # stronger boost — patterns more meaningful intraday
      boost_dead_zone: 0.2      # narrower dead zone — react to smaller pattern signals
      atr_stop_multiplier: 1.5  # tight ATR stop for day trading
      atr_stop_period: 10       # shorter ATR period for intraday
      trend_confirm_period: 10  # fast confirmation for intraday

    backtest:
      warmup_bars: 30           # minimal warmup for fast indicators
